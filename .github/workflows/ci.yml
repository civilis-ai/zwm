name: ZWM CI/CD

# P3-1 (audit) — 持续集成/部署流水线
#
# 触发条件:
#   push/PR 到 main → 运行完整测试 + lint
#   tag v*      → 额外构建 Docker 镜像并推送

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  # ---- 测试矩阵 ----
  test:
    name: "Python ${{ matrix.python-version }} on ${{ matrix.os }}"
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests
        run: python -m pytest tests/ --no-cov -q

      - name: Run with coverage (Linux only)
        if: runner.os == 'Linux'
        run: |
          pip install pytest-cov
          python -m pytest tests/ --cov=zwm --cov-report=xml --cov-report=term -q

      - name: Upload coverage (Linux only)
        if: runner.os == 'Linux'
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          fail_ci_if_error: false

  # ---- 导入完整性检查 ----
  smoke:
    name: "Import smoke test"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[api]"
      - run: python -c "from zwm.planner.agent import TrinityAgent; print('OK')"
      - run: python -c "from zwm.api.app import app; print('FastAPI OK')"
      - run: python -m zwm.cli info

  # ---- Docker 构建 (仅 tag) ----
  docker:
    name: "Build & push Docker image"
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [test, smoke]
    steps:
      - uses: actions/checkout@v4

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,format=short

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          target: production
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}